<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevClock</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base:      #0d0f12;
      --bg-surface:   #13161b;
      --bg-raised:    #1c2028;
      --bg-hover:     #232830;
      --border:       #2a2f3a;
      --border-focus: #3d8eff;

      --text-primary:   #e8eaf0;
      --text-secondary: #7a8499;
      --text-muted:     #4a5166;

      --accent-blue:    #3d8eff;
      --accent-cyan:    #00d4c8;
      --accent-amber:   #f5a623;
      --accent-green:   #3ddc84;
      --accent-red:     #ff5f5f;

      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-ui:   'IBM Plex Sans', system-ui, sans-serif;
    }

    html {
      width: 480px;
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.5;
      width: 480px;
      min-height: 320px;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 9px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .logo-icon {
      width: 18px;
      height: 18px;
      position: relative;
    }

    .logo-icon svg {
      width: 18px;
      height: 18px;
    }

    .logo-name {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    .logo-name span {
      color: var(--accent-cyan);
    }

    .header-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    /* ── Input Zone ─────────────────────────────────────── */
    .input-zone {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .input-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-prefix {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent-cyan);
      margin-right: 6px;
      flex-shrink: 0;
      user-select: none;
    }

    #timeInput {
      flex: 1;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 36px 8px 10px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      caret-color: var(--accent-cyan);
    }

    #timeInput::placeholder {
      color: var(--text-muted);
      font-size: 12px;
    }

    #timeInput:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(61, 142, 255, 0.15);
    }

    #timeInput.error {
      border-color: var(--accent-red);
      box-shadow: 0 0 0 2px rgba(255, 95, 95, 0.12);
    }

    #timeInput.success {
      border-color: var(--accent-green);
      box-shadow: 0 0 0 2px rgba(61, 220, 132, 0.1);
    }

    .input-clear {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1;
      padding: 2px;
      border-radius: 3px;
      display: none;
      transition: color 0.1s;
    }
    .input-clear:hover { color: var(--text-secondary); }
    .input-clear.visible { display: flex; }

    /* ── Source TZ Toggles ──────────────────────────────── */
    .tz-zone {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }

    .tz-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .tz-toggles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tz-btn {
      flex: 1;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 6px 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.12s;
      text-align: center;
      letter-spacing: 0.04em;
      position: relative;
      overflow: hidden;
    }

    .tz-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: #3a4052;
    }

    .tz-btn.active {
      background: rgba(61, 142, 255, 0.12);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .tz-btn .tz-btn-name {
      display: block;
      font-size: 11px;
      font-weight: 700;
    }

    .tz-btn .tz-btn-offset {
      display: block;
      font-size: 9px;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 1px;
      letter-spacing: 0.02em;
    }

    .tz-btn.active .tz-btn-offset {
      color: rgba(61, 142, 255, 0.7);
    }

    /* ── Result Card ────────────────────────────────────── */
    .result-zone {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      min-height: 74px;
    }

    .result-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 54px;
      color: var(--text-muted);
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    .result-card {
      display: none;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      animation: slideIn 0.15s ease;
    }

    .result-card.visible { display: block; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-from {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .result-from-tz {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(245, 166, 35, 0.15);
      color: var(--accent-amber);
      border: 1px solid rgba(245, 166, 35, 0.25);
      border-radius: 3px;
      padding: 1px 5px;
    }

    .result-from-time {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
    }

    .result-arrow {
      font-size: 10px;
      color: var(--text-muted);
      margin: 0 2px;
    }

    .result-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .result-time {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-cyan);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .result-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
    }

    .result-tz-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(0, 212, 200, 0.1);
      color: var(--accent-cyan);
      border: 1px solid rgba(0, 212, 200, 0.2);
      border-radius: 3px;
      padding: 2px 5px;
      margin-left: auto;
    }

    .result-unix {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 5px;
      display: flex;
      gap: 14px;
    }

    .result-unix span {
      color: var(--text-secondary);
    }

    /* ── Error State ────────────────────────────────────── */
    .error-msg {
      display: none;
      padding: 7px 10px;
      background: rgba(255, 95, 95, 0.08);
      border: 1px solid rgba(255, 95, 95, 0.2);
      border-radius: 5px;
      color: var(--accent-red);
      font-size: 11px;
      font-family: var(--font-mono);
      animation: slideIn 0.15s ease;
    }
    .error-msg.visible { display: block; }

    /* ── Actions ────────────────────────────────────────── */
    .actions-zone {
      padding: 10px 14px;
      display: flex;
      gap: 7px;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 10px;
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.12s;
      position: relative;
      overflow: hidden;
    }

    .btn-splunk {
      background: rgba(61, 142, 255, 0.1);
      border-color: rgba(61, 142, 255, 0.35);
      color: var(--accent-blue);
      flex: 2;
    }

    .btn-splunk:hover:not(:disabled) {
      background: rgba(61, 142, 255, 0.18);
      border-color: var(--accent-blue);
    }

    .btn-copy {
      background: rgba(0, 212, 200, 0.08);
      border-color: rgba(0, 212, 200, 0.25);
      color: var(--accent-cyan);
    }

    .btn-copy:hover:not(:disabled) {
      background: rgba(0, 212, 200, 0.15);
      border-color: var(--accent-cyan);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn .btn-icon {
      font-size: 12px;
    }

    /* Copied flash */
    .btn.copied {
      background: rgba(61, 220, 132, 0.12) !important;
      border-color: var(--accent-green) !important;
      color: var(--accent-green) !important;
    }

    /* ── Splunk Preview ─────────────────────────────────── */
    .splunk-preview {
      margin: 0 14px 10px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 7px 10px;
      display: none;
      animation: slideIn 0.15s ease;
    }

    .splunk-preview.visible { display: block; }

    .splunk-preview-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .splunk-preview-text {
      font-family: var(--font-mono);
      font-size: 10px;
      color: #7ec8e3;
      word-break: break-all;
      line-height: 1.5;
    }

    .splunk-preview-text .kw { color: #c792ea; }
    .splunk-preview-text .op { color: var(--text-secondary); }
    .splunk-preview-text .val { color: #c3e88d; }

    /* ── Footer ─────────────────────────────────────────── */
    .footer {
      padding: 7px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-surface);
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-link-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 2px 7px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.04em;
      transition: all 0.12s;
    }

    .footer-link-btn:hover {
      border-color: #3a4052;
      color: var(--text-primary);
      background: var(--bg-raised);
    }

    .footer-hint {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .footer-hint kbd {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 4px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-secondary);
    }

    .now-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .now-badge span {
      color: var(--text-secondary);
    }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="7.5" stroke="#3d8eff" stroke-width="1.2"/>
          <path d="M9 5v4.5l2.5 2" stroke="#00d4c8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9" cy="9" r="1" fill="#00d4c8"/>
        </svg>
      </div>
      <span class="logo-name">Dev<span>Clock</span></span>
    </div>
    <span class="header-meta">AU/Melbourne ↔ Global</span>
  </div>

  <!-- Input -->
  <div class="input-zone">
    <div class="input-label">Timestamp Input</div>
    <div class="input-wrapper">
      <span class="input-prefix">›</span>
      <input
        type="text"
        id="timeInput"
        placeholder="3:14pm · 09:00 UTC · 1718000000 · yesterday at 5pm"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="input-clear" id="clearBtn" title="Clear">✕</button>
    </div>
  </div>

  <!-- Source Timezone Toggles -->
  <div class="tz-zone">
    <div class="tz-label">Source Timezone</div>
    <div class="tz-toggles" id="tzToggles"></div>
  </div>

  <!-- Result -->
  <div class="result-zone">
    <div class="result-empty" id="resultEmpty">
      <span>⌨ type or paste a timestamp above</span>
    </div>
    <div class="result-card" id="resultCard">
      <div class="result-from">
        <span class="result-from-tz" id="resultFromTz">US/ET</span>
        <span class="result-from-time" id="resultFromTime">—</span>
        <span class="result-arrow">→</span>
        <span class="result-tz-badge">AUS/MELB</span>
      </div>
      <div class="result-main">
        <span class="result-time" id="resultTime">—</span>
        <span class="result-date" id="resultDate">—</span>
      </div>
      <div class="result-unix">
        unix: <span id="resultUnix">—</span>
        &nbsp;·&nbsp; iso: <span id="resultISO">—</span>
      </div>
    </div>
    <div class="error-msg" id="errorMsg">⚠ Could not parse timestamp — try a different format</div>
  </div>

  <!-- Splunk Preview -->
  <div class="splunk-preview" id="splunkPreview">
    <div class="splunk-preview-label" id="queryPreviewLabel">Query Preview</div>
    <div class="splunk-preview-text" id="splunkPreviewText"></div>
  </div>

  <!-- Actions -->
  <div class="actions-zone">
    <button class="btn btn-splunk" id="btnSplunk" disabled>
      <span class="btn-icon">⧉</span>
      Copy Query
    </button>
    <button class="btn btn-copy" id="btnCopy" disabled>
      <span class="btn-icon">⊞</span>
      Copy Time
    </button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-left">
      <span class="footer-hint">
        <kbd>Enter</kbd> convert &nbsp; <kbd>Esc</kbd> clear
      </span>
      <button type="button" class="footer-link-btn" id="btnOpenPreferences">Preferences</button>
    </div>
    <span class="now-badge" id="nowBadge">now: <span>—</span></span>
  </div>

  <!-- Local libraries required for MV3 extension execution -->
  <script src="lib/luxon.min.js"></script>
  <script src="preferences.js"></script>
  <script src="converter-controller.js"></script>
</body>
</html>
